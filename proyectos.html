<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Gestor de proyectos</h1>
    <div class="header-right">
      <nav id="main-nav" class="main-nav"></nav>
      <span id="user-email" style="margin-right: 1rem; font-size: 0.9rem;"></span>
      <button id="logout-button" class="btn-secondary">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <form id="project-form" class="project-form">
      <input type="hidden" id="project-id" />
      <div class="row">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="field">
          <label for="estado">Estado</label>
          <select id="estado" required>
            <option value="Abierto">Abierto</option>
            <option value="Cerrado">Cerrado</option>
          </select>
        </div>
        <div class="field">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required />
        </div>
        <div class="field">
          <label for="cliente">Cliente</label>
          <select id="cliente">
            <option value="">(sin cliente)</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="tipo-proyecto">Tipo de proyecto</label>
          <select id="tipo-proyecto">
            <option value="">(sin tipo)</option>
            <option value="Venta">Venta</option>
            <option value="Importación">Importación</option>
            <option value="Instalación">Instalación</option>
            <option value="Llave en mano">Llave en mano</option>
          </select>
        </div>
        <div class="field">
          <label for="filial-cliente">Filial del cliente</label>
          <input type="text" id="filial-cliente" />
        </div>
        <div class="field">
          <label for="responsable-comercial">Responsable comercial</label>
          <select id="responsable-comercial">
            <option value="">(sin asignar)</option>
          </select>
        </div>
        <div class="field">
          <label for="project-manager">Project Manager</label>
          <select id="project-manager">
            <option value="">(sin asignar)</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="contacto-nombre">Contacto del proyecto</label>
          <input type="text" id="contacto-nombre" />
        </div>
        <div class="field">
          <label for="contacto-email">Email de contacto</label>
          <input type="email" id="contacto-email" />
        </div>
        <div class="field">
          <label for="contacto-telefono">Teléfono de contacto</label>
          <input type="tel" id="contacto-telefono" />
        </div>
        <div class="field">
          <label for="frecuencia-comunicacion">Frecuencia de comunicación</label>
          <select id="frecuencia-comunicacion">
            <option value="">(sin definir)</option>
            <option value="Semanal">Semanal</option>
            <option value="Quincenal">Quincenal</option>
            <option value="Mensual">Mensual</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="fecha-kickoff">Fecha de kickoff</label>
          <input type="date" id="fecha-kickoff" />
        </div>
        <div class="field">
          <label for="plazo-dias">Plazo total (días)</label>
          <input type="number" id="plazo-dias" min="0" step="1" />
        </div>
        <div class="field">
          <label for="valor-venta">Valor de venta</label>
          <input type="number" id="valor-venta" min="0" step="0.01" />
        </div>
        <div class="field">
          <label for="valor-costo">Valor de costo</label>
          <input type="number" id="valor-costo" min="0" step="0.01" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="direccion-instalacion">Dirección de instalación</label>
          <input type="text" id="direccion-instalacion" />
        </div>
        <div class="field">
          <label for="fecha-inicio-real">Fecha de inicio real</label>
          <input type="date" id="fecha-inicio-real" />
        </div>
        <div class="field">
          <label for="fecha-termino-real">Fecha de término real</label>
          <input type="date" id="fecha-termino-real" />
        </div>
        <div class="field">
          <label for="cond-pago">Condición de pago</label>
          <input type="text" id="cond-pago" placeholder="Ej: 60 días" />
        </div>
      </div>
      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" rows="2"></textarea>
      </div>
      <p class="error-message" id="form-error"></p>
      <button type="submit" class="btn-primary" id="submit-button">Crear proyecto</button>
      <button type="button" class="btn-secondary" id="cancel-edit-button" style="display: none;">Cancelar edición</button>
    </form>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Cliente</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="projects-table-body">
          <!-- Las filas se generan dinámicamente desde js/projects.js -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
