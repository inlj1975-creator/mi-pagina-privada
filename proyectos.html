<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Gestor de proyectos</h1>
    <div class="header-right">
      <nav id="main-nav" class="main-nav"></nav>
      <span id="user-email" style="margin-right: 1rem; font-size: 0.9rem;"></span>
      <button id="logout-button" class="btn-secondary">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <form id="project-form" class="project-form">
      <input type="hidden" id="project-id" />
      <div class="row">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="field">
          <label for="estado">Estado</label>
          <select id="estado" required>
            <option value="Pendiente">Pendiente</option>
            <option value="En curso">En curso</option>
            <option value="Completado">Completado</option>
          </select>
        </div>
        <div class="field">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required />
        </div>
        <div class="field">
          <label for="cliente">Cliente</label>
          <select id="cliente">
            <option value="">(sin cliente)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" rows="2"></textarea>
      </div>
      <p class="error-message" id="form-error"></p>
      <button type="submit" class="btn-primary" id="submit-button">Crear proyecto</button>
      <button type="button" class="btn-secondary" id="cancel-edit-button" style="display: none;">Cancelar edición</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Cliente</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="projects-table-body">
        <!-- Las filas se generan dinámicamente desde js/projects.js -->
      </tbody>
    </table>
  </main>

  <script src="js/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
