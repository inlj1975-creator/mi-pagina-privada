<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi cuenta</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Gestor de proyectos</h1>
    <div class="header-right">
      <nav id="main-nav" class="main-nav"></nav>
      <span id="user-email" style="margin-right: 1rem; font-size: 0.9rem;"></span>
      <button id="logout-button" class="btn-secondary">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <h2>Microsoft Outlook</h2>
    <p>
      Conectá tu cuenta de Outlook para que las tareas que se te asignen
      aparezcan automáticamente como eventos en tu calendario.
    </p>

    <p>
      Estado: <span id="ms-estado-badge" class="badge badge-gris">Cargando...</span>
    </p>

    <button type="button" class="btn-primary" id="ms-connect-button" style="display: none;">
      Conectar con Outlook
    </button>
    <button type="button" class="btn-danger" id="ms-disconnect-button" style="display: none;">
      Desconectar
    </button>

    <p class="error-message" id="ms-error"></p>
  </main>

  <script src="js/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/configuracion.js"></script>
</body>
</html>
